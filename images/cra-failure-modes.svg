<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="system-ui,sans-serif" fill="#1e293b">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ══════════ FM1 ══════════ -->
  <rect x="30" y="20" width="380" height="370" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="46" y="38" font-size="11" font-weight="700" fill="#92400e">Failure Mode 1: Rules in Code</text>

  <!-- C1 -->
  <rect x="90" y="50" width="220" height="50" rx="6" fill="white" stroke="#d97706" stroke-width="1.5"/>
  <text x="200" y="70" text-anchor="middle" font-size="12" font-weight="600">Compliance identifies</text>
  <text x="200" y="87" text-anchor="middle" font-size="11" fill="#475569">rule change needed</text>

  <line x1="200" y1="100" x2="200" y2="122" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- T1 -->
  <rect x="90" y="124" width="220" height="50" rx="6" fill="white" stroke="#d97706" stroke-width="1.5"/>
  <text x="200" y="144" text-anchor="middle" font-size="12" font-weight="600">Files engineering ticket</text>
  <text x="200" y="161" text-anchor="middle" font-size="11" fill="#475569">and waits in backlog</text>

  <line x1="200" y1="174" x2="200" y2="196" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- E1 -->
  <rect x="90" y="198" width="220" height="50" rx="6" fill="white" stroke="#d97706" stroke-width="1.5"/>
  <text x="200" y="218" text-anchor="middle" font-size="12" font-weight="600">Code change + PR</text>
  <text x="200" y="235" text-anchor="middle" font-size="11" fill="#475569">+ Review + Approval</text>

  <line x1="200" y1="248" x2="200" y2="270" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- D1 -->
  <rect x="90" y="272" width="220" height="50" rx="6" fill="white" stroke="#d97706" stroke-width="1.5"/>
  <text x="200" y="292" text-anchor="middle" font-size="12" font-weight="600">Deploy + Regression test</text>

  <line x1="200" y1="322" x2="200" y2="344" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- W1 -->
  <rect x="90" y="346" width="220" height="30" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="200" y="366" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Weeks pass for a single threshold</text>

  <!-- ══════════ FM2 ══════════ -->
  <rect x="490" y="20" width="380" height="370" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="506" y="38" font-size="11" font-weight="700" fill="#991b1b">Failure Mode 2: Opaque Systems</text>

  <!-- C2 -->
  <rect x="550" y="50" width="220" height="50" rx="6" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <text x="660" y="70" text-anchor="middle" font-size="12" font-weight="600">Compliance needs to</text>
  <text x="660" y="87" text-anchor="middle" font-size="11" fill="#475569">verify scoring logic</text>

  <line x1="660" y1="100" x2="660" y2="122" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- I2 -->
  <rect x="550" y="124" width="220" height="50" rx="6" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <text x="660" y="144" text-anchor="middle" font-size="12" font-weight="600">Can't inspect</text>
  <text x="660" y="161" text-anchor="middle" font-size="11" fill="#475569">system behaviour</text>

  <line x1="660" y1="174" x2="660" y2="196" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- M2 -->
  <rect x="550" y="198" width="220" height="50" rx="6" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <text x="660" y="218" text-anchor="middle" font-size="12" font-weight="600">Manual verification</text>
  <text x="660" y="235" text-anchor="middle" font-size="11" fill="#475569">of every change</text>

  <line x1="660" y1="248" x2="660" y2="270" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- S2 -->
  <rect x="550" y="272" width="220" height="50" rx="6" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <text x="660" y="292" text-anchor="middle" font-size="12" font-weight="600">Slows all changes</text>
  <text x="660" y="309" text-anchor="middle" font-size="11" fill="#475569">to protect trust</text>

  <line x1="660" y1="322" x2="660" y2="344" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- S2 bottom label -->
  <rect x="550" y="346" width="220" height="30" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <text x="660" y="366" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">Trust gap widens over time</text>

  <!-- FM1 → O -->
  <polyline points="200,390 200,450 450,450" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FM2 → O -->
  <polyline points="660,390 660,450 510,450" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- O node -->
  <rect x="270" y="430" width="360" height="50" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="450" text-anchor="middle" font-size="13" font-weight="700">"Nobody owns the system"</text>
  <text x="450" y="469" text-anchor="middle" font-size="11" fill="#6b7280">Engineers &amp; compliance both feel locked out</text>

</svg>
